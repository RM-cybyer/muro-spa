<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Muro Spa">
<title>Muro Spa</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --olive:#6b8f5e;
  --olive-light:#8aab7b;
  --olive-pale:#c8dbbf;
  --olive-ultra:#eef5ea;
  --white:#ffffff;
  --text:#1a2e1a;
  --text-muted:#6b7f6b;
  --danger:#c0524a;
  --glass-bg:rgba(255,255,255,0.55);
  --glass-border:rgba(255,255,255,0.8);
  --glass-shadow:0 8px 32px rgba(80,120,70,0.12);
  --radius:24px;
  --radius-sm:16px;
}

body{
  font-family:'Outfit',sans-serif;
  font-weight:400;
  min-height:100vh;
  color:var(--text);
  font-size:15px;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(168,210,150,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(200,230,190,0.25) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(150,200,140,0.2) 0%, transparent 55%),
    #f2f7ee;
  background-attachment:fixed;
}

/* TOPBAR */
.topbar{
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.7);
  border-bottom:1px solid rgba(255,255,255,0.9);
  padding:0 20px;height:62px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.logo{font-size:21px;font-weight:600;color:var(--text);letter-spacing:-0.4px}
.logo span{color:var(--olive);font-weight:400;font-style:italic;font-family:Georgia,serif}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-date{font-size:12px;color:var(--text-muted)}
.tasa-pill{
  font-size:11px;font-weight:600;
  background:var(--olive);
  color:#fff;
  padding:5px 13px;border-radius:20px;
  letter-spacing:0.02em;
  box-shadow:0 2px 8px rgba(107,143,94,0.3);
}

/* MAIN */
.main{padding:20px 16px;padding-bottom:110px;max-width:480px;margin:0 auto}
.screen{display:none}.screen.active{display:block}

/* GLASS CARD BASE */
.glass{
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
}

/* BALANCE CARD */
.balance-card{
  background:linear-gradient(135deg,
    rgba(107,143,94,0.92) 0%,
    rgba(80,115,68,0.95) 50%,
    rgba(55,90,45,0.97) 100%);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:var(--radius);
  padding:30px 24px 26px;
  margin-bottom:16px;
  position:relative;overflow:hidden;
  box-shadow:0 16px 48px rgba(60,100,50,0.28),0 2px 0 rgba(255,255,255,0.1) inset;
}
.balance-card::before{
  content:'';position:absolute;
  top:-60px;right:-60px;
  width:220px;height:220px;
  background:radial-gradient(circle,rgba(255,255,255,0.12) 0%,transparent 70%);
  border-radius:50%;
}
.balance-card::after{
  content:'';position:absolute;
  bottom:-80px;left:-30px;
  width:260px;height:260px;
  background:radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 70%);
  border-radius:50%;
}
.balance-label{
  font-size:10px;font-weight:500;
  letter-spacing:0.16em;text-transform:uppercase;
  color:rgba(255,255,255,0.5);margin-bottom:10px;
  position:relative;z-index:1;
}
.balance-amount{
  font-size:44px;font-weight:300;
  color:#fff;letter-spacing:-2px;line-height:1;
  position:relative;z-index:1;
}
.balance-amount .cur{font-size:22px;font-weight:400;vertical-align:super;margin-right:2px;letter-spacing:0}
.balance-chips{
  display:flex;gap:8px;margin-top:14px;margin-bottom:20px;
  position:relative;z-index:1;
}
.balance-chip{
  font-size:10px;font-weight:500;
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.85);
  padding:4px 10px;border-radius:10px;
  letter-spacing:0.04em;
}
.balance-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  position:relative;z-index:1;
}
.balance-mini{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:14px;
  padding:12px 14px;
}
.balance-mini-label{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;font-weight:500}
.balance-mini-val{font-size:18px;font-weight:500;color:#fff}
.balance-mini-val.pos{color:#b8f0a0}
.balance-mini-val.neg{color:#ffb3ae}

/* SYNC ROW */
.sync-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:0 4px}
.sync-status{font-size:11px;color:var(--text-muted);flex:1}
.sync-status.ok{color:var(--olive)}.sync-status.err{color:var(--danger)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.dot.ok{background:var(--olive)}.dot.err{background:var(--danger)}
.dot.loading{background:#c0a050;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LABEL */
.label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;padding:0 4px}

/* QUICK ACCESS */
.quick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.qbtn{
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  background:rgba(255,255,255,0.65);
  border:1px solid rgba(255,255,255,0.9);
  box-shadow:0 4px 16px rgba(80,120,70,0.08);
  border-radius:var(--radius-sm);
  padding:20px 16px;cursor:pointer;
  font-family:'Outfit',sans-serif;
  color:var(--text);font-size:12px;font-weight:500;
  text-align:left;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  display:flex;flex-direction:column;gap:12px;
}
.qbtn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(80,120,70,0.15);
  background:rgba(255,255,255,0.8);
}
.qbtn:active{transform:scale(.97)}
.qi-wrap{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
}
.qi-wrap.green{background:linear-gradient(135deg,rgba(107,143,94,0.2),rgba(107,143,94,0.1))}
.qi-wrap.red{background:rgba(192,82,74,0.1)}
.qi-svg{width:20px;height:20px;stroke-width:2}
.qi-svg.green{stroke:var(--olive)}
.qi-svg.red{stroke:var(--danger)}

/* MOVEMENT ITEMS */
.item{
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  background:rgba(255,255,255,0.65);
  border:1px solid rgba(255,255,255,0.85);
  box-shadow:0 2px 12px rgba(80,120,70,0.07);
  border-radius:var(--radius-sm);
  padding:14px 16px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
  transition:all .2s;
}
.item:hover{box-shadow:0 6px 20px rgba(80,120,70,0.12);transform:translateY(-1px)}
.item-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  margin-right:12px;flex-shrink:0;
}
.item-icon.pos{background:linear-gradient(135deg,rgba(107,143,94,0.18),rgba(107,143,94,0.08))}
.item-icon.neg{background:rgba(192,82,74,0.08)}
.item-icon svg{width:18px;height:18px;stroke-width:1.8}
.item-icon.pos svg{stroke:var(--olive)}
.item-icon.neg svg{stroke:var(--danger)}
.item-l{flex:1;min-width:0;display:flex;align-items:center}
.item-info{min-width:0}
.item-name{font-size:14px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--text-muted)}
.item-amt{font-size:15px;font-weight:600}
.item-amt.pos{color:var(--olive)}.item-amt.neg{color:var(--danger)}

/* FORM CARD */
.card{
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  background:rgba(255,255,255,0.65);
  border:1px solid rgba(255,255,255,0.85);
  box-shadow:0 4px 24px rgba(80,120,70,0.08);
  border-radius:var(--radius);
  padding:24px 20px;margin-bottom:16px;
}
.screen-header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.screen-icon{
  width:50px;height:50px;border-radius:15px;
  display:flex;align-items:center;justify-content:center;
}
.screen-icon.green{
  background:linear-gradient(135deg,rgba(107,143,94,0.25),rgba(107,143,94,0.1));
  border:1px solid rgba(107,143,94,0.2);
}
.screen-icon.red{
  background:rgba(192,82,74,0.1);
  border:1px solid rgba(192,82,74,0.15);
}
.screen-icon svg{width:24px;height:24px;stroke-width:1.8}
.screen-icon.green svg{stroke:var(--olive)}
.screen-icon.red svg{stroke:var(--danger)}
.screen-title{font-size:19px;font-weight:600;letter-spacing:-0.3px;color:var(--text)}
.screen-sub{font-size:12px;color:var(--text-muted);margin-top:2px}

/* FIELDS */
.field{margin-bottom:16px}
.field label{
  display:block;font-size:10px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:7px;
}
.field input,.field select,.field textarea{
  width:100%;
  background:rgba(255,255,255,0.6);
  border:1.5px solid rgba(200,220,195,0.8);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:400;
  padding:12px 14px;outline:none;
  transition:all .15s;border-radius:var(--radius-sm);
  -webkit-appearance:none;
  backdrop-filter:blur(8px);
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--olive);
  background:rgba(255,255,255,0.85);
  box-shadow:0 0 0 3px rgba(107,143,94,0.12);
}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* BUTTON */
.btn{
  width:100%;padding:15px;
  font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
  cursor:pointer;border:none;
  background:linear-gradient(135deg,var(--olive) 0%,#4a7040 100%);
  color:#fff;
  transition:all .2s;border-radius:var(--radius-sm);
  box-shadow:0 4px 16px rgba(107,143,94,0.35);
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(rgba(255,255,255,0.1),transparent);
  border-radius:inherit;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(107,143,94,0.45)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* BADGE */
.badge.pendiente{
  background:rgba(200,190,150,0.2);color:#7a6a30;
  border:1px solid rgba(200,190,150,0.4);
  display:inline-block;font-size:9px;
  padding:2px 7px;letter-spacing:0.06em;
  text-transform:uppercase;margin-left:6px;
  vertical-align:middle;border-radius:6px;
}

/* EMPTY */
.empty{
  text-align:center;color:var(--text-muted);
  font-size:12px;padding:40px 0;
  letter-spacing:.04em;
}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:0.4}

/* TOAST */
.toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(8px);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  background:rgba(26,46,26,0.9);
  color:#b8f0a0;
  font-size:12px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:13px 26px;opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  z-index:999;pointer-events:none;
  white-space:nowrap;border-radius:30px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  background:rgba(255,255,255,0.75);
  border-top:1px solid rgba(255,255,255,0.9);
  z-index:100;
  box-shadow:0 -4px 24px rgba(80,120,70,0.08);
  padding-bottom:env(safe-area-inset-bottom);
}
.nb{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:4px;
  padding:10px 4px 13px;
  font-size:9px;font-weight:500;
  color:var(--text-muted);cursor:pointer;
  transition:all .15s;border:none;background:none;
  font-family:'Outfit',sans-serif;
  letter-spacing:.06em;text-transform:uppercase;
}
.nb svg{width:21px;height:21px;stroke-width:1.6;stroke:currentColor;fill:none}
.nb.active{color:var(--olive)}
.nb-bar{
  width:22px;height:3px;border-radius:2px;
  background:var(--olive);opacity:0;
  margin-top:1px;transition:opacity .2s;
}
.nb.active .nb-bar{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Muro <span>Spa</span></div>
  <div class="topbar-right">
    <div class="tasa-pill" id="tasa-pill">Cargando...</div>
    <div class="topbar-date" id="navDate"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="main">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="balance-card">
      <div class="balance-label">Balance del día</div>
      <div class="balance-amount"><span class="cur">$</span><span id="d-bal-val">0.00</span></div>
      <div class="balance-chips">
        <span class="balance-chip" id="d-date-chip">Hoy</span>
      </div>
      <div class="balance-row">
        <div class="balance-mini">
          <div class="balance-mini-label">Ingresos</div>
          <div class="balance-mini-val pos" id="d-ing">$0.00</div>
        </div>
        <div class="balance-mini">
          <div class="balance-mini-label">Egresos</div>
          <div class="balance-mini-val neg" id="d-egr">$0.00</div>
        </div>
      </div>
    </div>

    <div class="sync-row">
      <div class="dot" id="sync-dot"></div>
      <div class="sync-status" id="sync-status">Conectando...</div>
    </div>

    <div class="label">Acceso rápido</div>
    <div class="quick">
      <button class="qbtn" onclick="goTo('transacciones')">
        <div class="qi-wrap green">
          <svg class="qi-svg green" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14"/></svg>
        </div>
        Venta / Ingreso
      </button>
      <button class="qbtn" onclick="goTo('gastos')">
        <div class="qi-wrap red">
          <svg class="qi-svg red" viewBox="0 0 24 24" fill="none"><path d="M5 12h14"/></svg>
        </div>
        Gasto / Egreso
      </button>
    </div>

    <div class="label">Últimos movimientos</div>
    <div id="d-lista"><div class="empty"><div class="empty-icon">🌿</div>Sin movimientos aún</div></div>
  </div>

  <!-- VENTAS -->
  <div class="screen" id="screen-transacciones">
    <div class="screen-header">
      <div class="screen-icon green">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      </div>
      <div>
        <div class="screen-title">Registrar venta</div>
        <div class="screen-sub">Nuevo ingreso al spa</div>
      </div>
    </div>
    <div class="card">
      <div class="field"><label>Cliente</label><input type="text" id="v-cli" placeholder="Nombre del cliente"></div>
      <div class="field"><label>Terapia / Servicio</label>
        <input type="text" id="v-terapia" placeholder="Selecciona o escribe..." list="lista-terapias">
        <datalist id="lista-terapias">
          <option>Reconstrucción romana</option><option>Masaje contractura</option>
          <option>Masaje relajante</option><option>Facial y masaje</option>
          <option>Descontracturante zona</option><option>Masaje deportivo</option>
          <option>Paquete spa completo</option>
        </datalist>
      </div>
      <div class="field"><label>Encargado</label><input type="text" id="v-enc" placeholder="Ej: Freddy, FYG..."></div>
      <div class="field"><label>Método de pago</label>
        <input type="text" id="v-metodo" placeholder="Selecciona o escribe..." list="lista-metodos" oninput="actualizarMonto()">
        <datalist id="lista-metodos">
          <option>Zelle</option><option>Zinli</option><option>Binance</option><option>PayPal</option>
          <option>Divisas Efectivo</option><option>Pago móvil</option><option>Transferencia</option>
        </datalist>
      </div>
      <div class="field-row">
        <div class="field" id="campo-usd"><label>Precio USD</label><input type="number" id="v-precio" placeholder="0.00" step="0.01"></div>
        <div class="field" id="campo-bs" style="display:none"><label>Monto Bs</label><input type="number" id="v-precio-bs" placeholder="0.00" step="0.01"></div>
      </div>
      <div class="field"><label>Canal</label>
        <select id="v-canal"><option value="APP">App</option><option>Instagram</option><option>Frecuente</option><option>Referido</option></select>
      </div>
      <div class="field"><label>Teléfono (opcional)</label><input type="tel" id="v-tel" placeholder="+58..."></div>
      <div class="field"><label>Fecha</label><input type="date" id="v-fecha"></div>
      <button class="btn" id="btn-venta" onclick="guardarVenta()">Registrar venta</button>
    </div>
    <div class="label">Historial</div>
    <div id="v-lista"><div class="empty"><div class="empty-icon">🌿</div>Sin ventas registradas</div></div>
  </div>

  <!-- GASTOS -->
  <div class="screen" id="screen-gastos">
    <div class="screen-header">
      <div class="screen-icon red">
        <svg viewBox="0 0 24 24" fill="none"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>
      </div>
      <div>
        <div class="screen-title">Registrar gasto</div>
        <div class="screen-sub">Nuevo egreso del spa</div>
      </div>
    </div>
    <div class="card">
      <div class="field"><label>Categoría</label>
        <input type="text" id="g-cat" placeholder="Selecciona o escribe..." list="lista-categorias">
        <datalist id="lista-categorias">
          <option>Farmatodo</option><option>Publicidad</option><option>Parafiscales</option>
          <option>Servicio</option><option>Condominio</option><option>Alquiler</option>
          <option>Delivery</option><option>Insumos</option><option>Mercado</option><option>Comida</option>
        </datalist>
      </div>
      <div class="field"><label>Método de pago</label>
        <input type="text" id="g-metodo" placeholder="Selecciona o escribe..." list="lista-metodos-gasto" oninput="actualizarMontoGasto()">
        <datalist id="lista-metodos-gasto">
          <option>Zelle</option><option>Zinli</option><option>Binance</option><option>PayPal</option>
          <option>Divisas Efectivo</option><option>Pago móvil</option><option>Transferencia</option>
        </datalist>
      </div>
      <div class="field-row">
        <div class="field" id="g-campo-usd"><label>Monto USD</label><input type="number" id="g-usd" placeholder="0.00" step="0.01"></div>
        <div class="field" id="g-campo-bs" style="display:none"><label>Monto Bs</label><input type="number" id="g-bs" placeholder="0.00" step="0.01"></div>
      </div>
      <div class="field"><label>Fecha</label><input type="date" id="g-fecha"></div>
      <button class="btn" id="btn-gasto" onclick="guardarGasto()">Registrar gasto</button>
    </div>
    <div class="label">Historial</div>
    <div id="g-lista"><div class="empty"><div class="empty-icon">🌿</div>Sin gastos registrados</div></div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nb active" id="nav-home" onclick="goTo('home')">
    <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9M5 10v10h5v-5h4v5h5V10"/></svg>
    Inicio<div class="nb-bar"></div>
  </button>
  <button class="nb" id="nav-transacciones" onclick="goTo('transacciones')">
    <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
    Ventas<div class="nb-bar"></div>
  </button>
  <button class="nb" id="nav-gastos" onclick="goTo('gastos')">
    <svg viewBox="0 0 24 24"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>
    Gastos<div class="nb-bar"></div>
  </button>
</nav>

<script>
let tasaUSD=471.7,tasaEUR=543.4;
const metodosBS=['Pago móvil','Transferencia'];
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbx_VUF06zt4ZQkcKufyRQHPiTAqkIPTRU0GbgU67Ickm5P56iRdZx8w01pdZ03YzaEDKQ/exec';
let D={ventas:[],gastos:[]};
try{D=JSON.parse(localStorage.getItem('muro_v3')||'{"ventas":[],"gastos":[]}')}catch(e){}
const save=()=>{try{localStorage.setItem('muro_v3',JSON.stringify(D))}catch(e){}};
const fmt=n=>'$'+parseFloat(n||0).toFixed(2);
const today=()=>new Date().toISOString().split('T')[0];

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function setSyncStatus(s,m){document.getElementById('sync-dot').className='dot '+s;const el=document.getElementById('sync-status');el.className='sync-status '+s;el.textContent=m}
function actualizarMonto(){const m=document.getElementById('v-metodo').value;const esBS=metodosBS.includes(m);document.getElementById('campo-usd').style.display=esBS?'none':'block';document.getElementById('campo-bs').style.display=esBS?'block':'none'}
function actualizarMontoGasto(){const m=document.getElementById('g-metodo').value;const esBS=metodosBS.includes(m);document.getElementById('g-campo-usd').style.display=esBS?'none':'block';document.getElementById('g-campo-bs').style.display=esBS?'block':'none'}

function goTo(s){
  document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.getElementById('nav-'+s).classList.add('active');
  if(s==='home')renderHome();
}

const fechaHoy=new Date();
document.getElementById('navDate').textContent=fechaHoy.toLocaleDateString('es-VE',{weekday:'short',day:'numeric',month:'short'});
document.getElementById('d-date-chip').textContent=fechaHoy.toLocaleDateString('es-VE',{day:'numeric',month:'short'});
document.getElementById('v-fecha').value=today();
document.getElementById('g-fecha').value=today();

function cargarTasa(){
  setSyncStatus('loading','Conectando...');
  fetch('https://api.exchangerate-api.com/v4/latest/USD')
    .then(r=>r.json())
    .then(d=>{
      tasaUSD=d.rates.VES;
      tasaEUR=d.rates.VES/d.rates.EUR;
      document.getElementById('tasa-pill').textContent='EUR: Bs '+tasaEUR.toFixed(2);
      setSyncStatus('ok','Conectado · Google Sheets activo');
    })
    .catch(()=>{setSyncStatus('err','Sin conexión');document.getElementById('tasa-pill').textContent='Sin conexión'});
}

async function guardarVenta(){
  const esBS=document.getElementById('campo-bs').style.display!=='none';
  const montoBS=parseFloat(document.getElementById('v-precio-bs').value||0);
  const montoUSD=parseFloat(document.getElementById('v-precio').value||0);
  const precioFinal=esBS?(montoBS/tasaEUR):montoUSD;
  const cli=document.getElementById('v-cli').value.trim();
  if(!precioFinal||!cli){toast('Completa cliente y precio');return}
  const btn=document.getElementById('btn-venta');btn.disabled=true;btn.textContent='Guardando...';
  const payload={action:'registrarVenta',cliente:cli,terapia:document.getElementById('v-terapia').value,encargado:document.getElementById('v-enc').value,precio:precioFinal,pago_bs:esBS?montoBS:'',metodo_pago:document.getElementById('v-metodo').value,canal:document.getElementById('v-canal').value,numero:document.getElementById('v-tel').value,fecha:document.getElementById('v-fecha').value,moneda:esBS?'Bs':'USD',tasa_eur:tasaEUR,tasa_usd:tasaUSD};
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});
    D.ventas.unshift({...payload,id:Date.now()});save();renderVentas();renderHome();
    ['v-cli','v-precio','v-precio-bs','v-tel'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('v-terapia').value='';document.getElementById('v-metodo').value='';
    document.getElementById('v-fecha').value=today();actualizarMonto();
    toast('✓ Venta guardada en Sheets');
  }catch(e){toast('Sin conexión — guardado local');D.ventas.unshift({...payload,id:Date.now(),local:true});save();renderVentas()}
  btn.disabled=false;btn.textContent='Registrar venta';
}

async function guardarGasto(){
  const esBS=document.getElementById('g-campo-bs').style.display!=='none';
  const montoBS=parseFloat(document.getElementById('g-bs').value||0);
  const montoUSD=parseFloat(document.getElementById('g-usd').value||0);
  const montoFinal=esBS?(montoBS/tasaEUR):montoUSD;
  const cat=document.getElementById('g-cat').value.trim();
  if(!montoFinal||!cat){toast('Completa categoría y monto');return}
  const btn=document.getElementById('btn-gasto');btn.disabled=true;btn.textContent='Guardando...';
  const payload={action:'registrarGasto',categoria:cat,monto_usd:montoFinal,monto_bs:esBS?montoBS:'',metodo_pago:document.getElementById('g-metodo').value,fecha:document.getElementById('g-fecha').value,moneda:esBS?'Bs':'USD',tasa_eur:tasaEUR,tasa_usd:tasaUSD};
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});
    D.gastos.unshift({...payload,id:Date.now()});save();renderGastos();renderHome();
    ['g-usd','g-bs'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('g-cat').value='';document.getElementById('g-metodo').value='';
    document.getElementById('g-fecha').value=today();actualizarMontoGasto();
    toast('✓ Gasto guardado en Sheets');
  }catch(e){toast('Sin conexión — guardado local');D.gastos.unshift({...payload,id:Date.now(),local:true});save();renderGastos()}
  btn.disabled=false;btn.textContent='Registrar gasto';
}

function renderVentas(){
  const el=document.getElementById('v-lista');
  if(!D.ventas.length){el.innerHTML='<div class="empty"><div class="empty-icon">🌿</div>Sin ventas registradas</div>';return}
  el.innerHTML=D.ventas.slice(0,10).map(v=>`<div class="item"><div class="item-l"><div class="item-icon pos"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke-width="1.8"/></svg></div><div class="item-info"><div class="item-name">${v.cliente}${v.local?'<span class="badge pendiente">local</span>':''}</div><div class="item-sub">${v.terapia||'—'} · ${v.fecha}</div></div></div><div class="item-amt pos">+${fmt(v.precio)}</div></div>`).join('');
}

function renderGastos(){
  const el=document.getElementById('g-lista');
  if(!D.gastos.length){el.innerHTML='<div class="empty"><div class="empty-icon">🌿</div>Sin gastos registrados</div>';return}
  el.innerHTML=D.gastos.slice(0,10).map(g=>`<div class="item"><div class="item-l"><div class="item-icon neg"><svg viewBox="0 0 24 24" fill="none"><path d="M20 12V22H4V12M22 7H2v5h20V7zM12 22V7" stroke-width="1.8"/></svg></div><div class="item-info"><div class="item-name">${g.categoria||'—'}${g.local?'<span class="badge pendiente">local</span>':''}</div><div class="item-sub">${g.metodo_pago||'—'} · ${g.fecha}</div></div></div><div class="item-amt neg">-${fmt(g.monto_usd)}</div></div>`).join('');
}

function renderHome(){
  const hoy=today();
  const ingHoy=D.ventas.filter(v=>v.fecha===hoy).reduce((a,v)=>a+parseFloat(v.precio||0),0);
  const egrHoy=D.gastos.filter(g=>g.fecha===hoy).reduce((a,g)=>a+parseFloat(g.monto_usd||0),0);
  const balHoy=ingHoy-egrHoy;
  document.getElementById('d-ing').textContent=fmt(ingHoy);
  document.getElementById('d-egr').textContent=fmt(egrHoy);
  document.getElementById('d-bal-val').textContent=fmt(Math.abs(balHoy)).replace('$','');
  const ult=[...D.ventas.slice(0,3).map(v=>({...v,tipo:'venta'})),...D.gastos.slice(0,3).map(g=>({...g,tipo:'gasto'}))].sort((a,b)=>b.id-a.id).slice(0,6);
  const dl=document.getElementById('d-lista');
  if(!ult.length){dl.innerHTML='<div class="empty"><div class="empty-icon">🌿</div>Sin movimientos aún</div>';return}
  dl.innerHTML=ult.map(m=>`<div class="item"><div class="item-l"><div class="item-icon ${m.tipo==='venta'?'pos':'neg'}"><svg viewBox="0 0 24 24" fill="none">${m.tipo==='venta'?'<path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" stroke-width="1.8"/>':'<path d="M20 12V22H4V12M22 7H2v5h20V7zM12 22V7" stroke-width="1.8"/>'}</svg></div><div class="item-info"><div class="item-name">${m.tipo==='venta'?m.cliente:m.categoria}</div><div class="item-sub">${m.tipo==='venta'?(m.terapia||'—'):(m.metodo_pago||'—')} · ${m.fecha}</div></div></div><div class="item-amt ${m.tipo==='venta'?'pos':'neg'}">${m.tipo==='venta'?'+':'-'}${fmt(m.tipo==='venta'?m.precio:m.monto_usd)}</div></div>`).join('');
}

renderHome();renderVentas();renderGastos();cargarTasa();
</script>
</body>
</html>
